# =============================================================================
# Section 6: Communication Patterns
# =============================================================================
communication:
  email_templates:
    - scenario: "Initial Response"
      tone: "professional, manufacturing-aware, urgent"
      key_elements:
        - "Acknowledge production impact"
        - "Understand shift timing"
        - "Set immediate next steps"
      example_opening: "Thank you for contacting FactoryOS Support."

    - scenario: "Request for Information"
      tone: "specific, technical, safety-conscious"
      key_elements:
        - "Request PLC logs or OPC diagnostics"
        - "Ask about machine state"
        - "Confirm safety protocols followed"
      example_opening: "To investigate this production issue, we need..."

    - scenario: "Resolution Notification"
      tone: "clear, verified, documented"
      key_elements:
        - "Confirm production restored"
        - "Document root cause"
        - "Provide prevention steps"
      example_opening: "Your production issue has been resolved."

    - scenario: "Escalation Notice"
      tone: "urgent, transparent, timeline-focused"
      key_elements:
        - "Explain engineering involvement"
        - "Set hard timeline"
        - "Provide interim workaround"
      example_opening: "This issue is being escalated to our OT engineering team."

    - scenario: "Follow-up Check"
      tone: "proactive, production-focused"
      key_elements:
        - "Verify production running"
        - "Check OEE back to normal"
        - "Offer optimization review"
      example_opening: "We are following up on your recent FactoryOS support case."

  language_patterns:
    formal_terms:
      - "Thank you for contacting FactoryOS Support"
      - "We understand production uptime is critical"
      - "Please confirm production is running normally"
      - "We will coordinate with your plant engineering team"
      - "Safety is our top priority"

    technical_terms:
      - "PLC"
      - "OPC-UA"
      - "Modbus"
      - "work order"
      - "work center"
      - "OEE"
      - "cycle time"
      - "downtime code"
      - "CMM"
      - "SPC"

    product_specific:
      SFC:
        - "work order"
        - "machine status"
        - "production count"
        - "cycle time"
        - "operator terminal"
      PDM:
        - "vibration signature"
        - "failure prediction"
        - "maintenance window"
        - "asset health"
        - "RUL"
      QMS:
        - "inspection plan"
        - "control chart"
        - "NCR"
        - "CAPA"
        - "audit finding"
      SCV:
        - "ASN"
        - "supplier scorecard"
        - "lead time"
        - "demand forecast"
        - "risk score"

  customer_tone_patterns:
    frustrated:
      indicators:
        - "The line is down"
        - "We are losing production every hour"
        - "Our customer is waiting for parts"
        - "This is a safety concern"
      response_approach: "Immediate priority, focus on production restoration, engage on-site support if available"

    technical:
      indicators:
        - "The PLC shows fault code..."
        - "OPC connection state is..."
        - "The cycle time histogram shows..."
      response_approach: "Match OT technical depth, share PLC debugging, offer remote session"

    executive:
      indicators:
        - "Our plant manager is asking"
        - "This affects our OEM contract"
        - "We need this for our audit"
      response_approach: "Executive summary, focus on production/quality impact, offer VP escalation"

# =============================================================================
# Section 7: JIRA Escalation Patterns
# =============================================================================
jira:
  project_key: "FOS"
  project_name: "FactoryOS Engineering Support"

  issue_types:
    - name: "Production Bug"
      percentage: 40
      description: "Issue affecting production operations"
      typical_priority: ["Critical", "High"]

    - name: "Support Escalation"
      percentage: 30
      description: "Customer issue requiring engineering"
      typical_priority: ["High", "Critical"]

    - name: "Connectivity Issue"
      percentage: 20
      description: "OT/IT integration problem"
      typical_priority: ["High", "Medium"]

    - name: "Enhancement"
      percentage: 10
      description: "New feature or protocol support"
      typical_priority: ["Medium", "Low"]

  components:
    - name: "Shop Floor Control"
      code: "SFC"
      lead: "L3 Engineer"
    - name: "Predictive Maintenance"
      code: "PDM"
      lead: "L3 Engineer"
    - name: "Quality Management"
      code: "QMS"
      lead: "L3 Engineer"
    - name: "Supply Chain"
      code: "SCV"
      lead: "L3 Engineer"
    - name: "OPC/PLC Integration"
      code: "OPC"
      lead: "L3 Engineer"
    - name: "Infrastructure"
      code: "INFRA"
      lead: "L3 Engineer"

  priorities:
    - name: "Critical"
      description: "Production line down or safety issue"
      response_time: "5 minutes"
    - name: "High"
      description: "Production impaired"
      response_time: "30 minutes"
    - name: "Medium"
      description: "Important but production continues"
      response_time: "4 hours"
    - name: "Low"
      description: "Minor issue or enhancement"
      response_time: "1 business day"

  escalation_criteria:
    automatic:
      - "Production line stopped"
      - "Safety system malfunction"
      - "Complete OT connectivity loss"
      - "Quality data corruption"
      - "P1 not resolved in 1 hour"
    manual:
      - "Customer requests engineering on-site"
      - "L2 unable to restore connectivity"
      - "Suspected PLC firmware issue"
      - "Performance degradation during production"

  workflow:
    statuses:
      - "Open"
      - "In Progress"
      - "In Review"
      - "Factory Testing"
      - "Pending Deployment"
      - "Resolved"
      - "Closed"
    transitions:
      - from: "Open"
        to: "In Progress"
        action: "Start Work"
      - from: "In Progress"
        to: "In Review"
        action: "Submit for Review"
      - from: "In Review"
        to: "Factory Testing"
        action: "Approve for Testing"
      - from: "Factory Testing"
        to: "Pending Deployment"
        action: "Factory Test Passed"
      - from: "Pending Deployment"
        to: "Resolved"
        action: "Deploy to Production"
      - from: "Resolved"
        to: "Closed"
        action: "Verify and Close"

  labels:
    - "production-down"
    - "safety-concern"
    - "plc-issue"
    - "opc-connectivity"
    - "quality-impact"
    - "customer-audit"
    - "hotfix-required"
    - "oem-contract"
