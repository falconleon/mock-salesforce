# =============================================================================
# Section 6: Communication Patterns
# =============================================================================
communication:
  email_templates:
    - scenario: "Initial Response"
      tone: "professional, empathetic, HIPAA-conscious"
      key_elements:
        - "Thank customer for contacting"
        - "Acknowledge the urgency in healthcare context"
        - "Confirm no PHI in support communication"
      example_opening: "Thank you for reaching out to MedTech Solutions Support."

    - scenario: "Request for Information"
      tone: "helpful, specific, compliance-aware"
      key_elements:
        - "Request specific technical details"
        - "Remind about secure file sharing for PHI"
        - "Provide alternative secure upload options"
      example_opening: "To help us investigate this interface issue, could you please provide..."

    - scenario: "Resolution Notification"
      tone: "positive, clear, documentation-focused"
      key_elements:
        - "Confirm issue is resolved"
        - "Document changes for compliance"
        - "Provide verification steps"
      example_opening: "Great news! We have resolved the integration issue you reported."

    - scenario: "Escalation Notice"
      tone: "reassuring, transparent, timeline-focused"
      key_elements:
        - "Explain engineering escalation"
        - "Set clear timeline expectations"
        - "Provide direct escalation contact"
      example_opening: "We are escalating this to our Clinical Integration engineering team."

    - scenario: "Follow-up Check"
      tone: "caring, brief, proactive"
      key_elements:
        - "Verify interface stability"
        - "Offer additional optimization"
        - "Request feedback"
      example_opening: "We wanted to follow up on your recent EHR Connect support case."

  language_patterns:
    formal_terms:
      - "Thank you for contacting MedTech Solutions Support"
      - "We understand the critical nature of healthcare operations"
      - "Please ensure no PHI is included in this communication"
      - "We appreciate your patience during our investigation"
      - "Your feedback helps us improve patient care delivery"

    technical_terms:
      - "HL7 message"
      - "FHIR resource"
      - "ADT feed"
      - "C-CDA document"
      - "MRN reconciliation"
      - "interface engine"
      - "clinical data repository"
      - "audit trail"
      - "BAA agreement"
      - "PHI protection"

    product_specific:
      EHR:
        - "interface channel"
        - "message transformation"
        - "ADT notification"
        - "clinical feed"
        - "connection profile"
      PPP:
        - "patient portal"
        - "secure messaging"
        - "proxy access"
        - "telehealth session"
        - "appointment slot"
      CAS:
        - "quality measure"
        - "risk score"
        - "care gap"
        - "population cohort"
        - "registry submission"
      HCM:
        - "risk assessment"
        - "policy attestation"
        - "BAA tracker"
        - "compliance score"
        - "training module"

  customer_tone_patterns:
    frustrated:
      indicators:
        - "This is affecting patient care"
        - "We cannot bill until this is fixed"
        - "Our auditors are asking about this"
        - "We've been escalating for days"
      response_approach: "Acknowledge clinical impact, prioritize resolution, escalate immediately if patient care affected"

    technical:
      indicators:
        - "The HL7 acknowledgment shows..."
        - "FHIR validation is returning..."
        - "I checked the interface logs..."
      response_approach: "Match technical depth, provide detailed debugging, offer screen sharing for complex issues"

    executive:
      indicators:
        - "I need this for our board meeting"
        - "What is the impact on our compliance"
        - "Please escalate to your leadership"
      response_approach: "Executive summary format, focus on business and compliance impact, provide escalation path"

# =============================================================================
# Section 7: JIRA Escalation Patterns
# =============================================================================
jira:
  project_key: "MTS"
  project_name: "MedTech Solutions Engineering Support"

  issue_types:
    - name: "Bug"
      percentage: 45
      description: "Software defect requiring code fix"
      typical_priority: ["High", "Critical"]

    - name: "Support Escalation"
      percentage: 30
      description: "Customer issue requiring engineering investigation"
      typical_priority: ["Critical", "High"]

    - name: "Security Issue"
      percentage: 15
      description: "PHI or security-related concern"
      typical_priority: ["Critical"]

    - name: "Integration Request"
      percentage: 10
      description: "New EHR or system integration"
      typical_priority: ["Medium", "Low"]

  components:
    - name: "EHR Connect"
      code: "EHR"
      lead: "L3 Engineer"
    - name: "Patient Portal"
      code: "PPP"
      lead: "L3 Engineer"
    - name: "Clinical Analytics"
      code: "CAS"
      lead: "L3 Engineer"
    - name: "Compliance Manager"
      code: "HCM"
      lead: "L3 Engineer"
    - name: "HL7 Engine"
      code: "HL7"
      lead: "L3 Engineer"
    - name: "FHIR API"
      code: "FHIR"
      lead: "L3 Engineer"
    - name: "Infrastructure"
      code: "INFRA"
      lead: "L3 Engineer"

  priorities:
    - name: "Critical"
      description: "PHI exposure or patient care impact, immediate action"
      response_time: "15 minutes"
    - name: "High"
      description: "Major functionality impaired, compliance at risk"
      response_time: "2 hours"
    - name: "Medium"
      description: "Important but not blocking patient care"
      response_time: "1 business day"
    - name: "Low"
      description: "Minor issue or enhancement"
      response_time: "1 week"

  escalation_criteria:
    automatic:
      - "Any PHI exposure or security incident"
      - "Patient care system unavailable"
      - "Regulatory submission deadline at risk"
      - "P1 not resolved in 2 hours"
      - "Same interface issue affecting 3+ customers"
    manual:
      - "Customer requests engineering review"
      - "L2 unable to reproduce in test environment"
      - "Suspected HL7/FHIR compliance issue"
      - "Performance degradation confirmed"

  workflow:
    statuses:
      - "Open"
      - "In Progress"
      - "In Review"
      - "Pending Deployment"
      - "Resolved"
      - "Closed"
    transitions:
      - from: "Open"
        to: "In Progress"
        action: "Start Work"
      - from: "In Progress"
        to: "In Review"
        action: "Submit for Review"
      - from: "In Review"
        to: "Pending Deployment"
        action: "Approve"
      - from: "Pending Deployment"
        to: "Resolved"
        action: "Deploy to Production"
      - from: "Resolved"
        to: "Closed"
        action: "Verify and Close"

  labels:
    - "customer-escalation"
    - "phi-incident"
    - "patient-care-impact"
    - "compliance-deadline"
    - "interface-failure"
    - "security-concern"
    - "regression"
    - "hotfix-required"
