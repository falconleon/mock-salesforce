# MedTech Solutions - Healthcare IT Vendor Profile
# EHR/EMR integration platform for hospitals, clinics, and practices.

# =============================================================================
# Section 1: Company Information
# =============================================================================
company:
  name: "MedTech Solutions"
  founded: 2008
  headquarters: "Boston, MA"
  website: "medtechsolutions.com"
  industry: "Healthcare IT"
  employees: 680
  annual_revenue: 125000000
  tagline: "Connecting Care, Empowering Outcomes"
  description: |
    MedTech Solutions is a leading healthcare IT company specializing in
    EHR/EMR integration, patient engagement, and clinical analytics.

# =============================================================================
# Section 2: Products (4 products with detailed issue profiles)
# =============================================================================
products:
  - name: "EHR Connect"
    code: "EHR"
    type: "Integration Platform"
    category: "Clinical Integration"
    version: "6.2.0"
    tiers:
      - name: "Community"
        price_monthly: 2500
        connection_limit: 5
      - name: "Professional"
        price_monthly: 7500
        connection_limit: 25
      - name: "Enterprise"
        price_monthly: 15000
        connection_limit: null
    features:
      - "HL7 FHIR R4 native support"
      - "HL7 v2.x message transformation"
      - "Real-time ADT notifications"
      - "Clinical document exchange (C-CDA)"
      - "Bi-directional EHR sync"
      - "Audit trail and compliance logging"
    common_issues:
      - category: "Integration"
        issues:
          - "HL7 message parsing failures on malformed ADT segments"
          - "FHIR resource validation errors with custom extensions"
          - "Connection timeout to on-premise Epic systems"
      - category: "Data Sync"
        issues:
          - "Patient demographics not updating after merge"
          - "Duplicate MRNs created during bulk import"
          - "Lab results delayed in outbound feed"
      - category: "Compliance"
        issues:
          - "Audit log missing entries for after-hours access"
          - "PHI exposure alert in test environment"
          - "Certificate renewal blocking production interface"

  - name: "Patient Portal Pro"
    code: "PPP"
    type: "SaaS"
    category: "Patient Engagement"
    version: "4.1.2"
    tiers:
      - name: "Basic"
        price_monthly: 1200
        patient_limit: 5000
      - name: "Standard"
        price_monthly: 3500
        patient_limit: 25000
      - name: "Enterprise"
        price_monthly: 8000
        patient_limit: null
    features:
      - "Secure patient messaging"
      - "Appointment scheduling"
      - "Prescription refill requests"
      - "Lab results viewing"
      - "Telehealth integration"
      - "Mobile app for iOS/Android"
    common_issues:
      - category: "Access"
        issues:
          - "Patient unable to reset password after email change"
          - "Two-factor authentication SMS not delivering"
          - "Proxy access not granting correct permissions"
      - category: "Appointments"
        issues:
          - "Available slots not syncing from practice management"
          - "Appointment confirmation emails going to spam"
          - "Time zone showing incorrect for patient location"
      - category: "Messaging"
        issues:
          - "Secure message attachments failing to upload"
          - "Read receipts not updating for provider"
          - "Message thread missing after portal upgrade"

  - name: "Clinical Analytics Suite"
    code: "CAS"
    type: "SaaS"
    category: "Healthcare Analytics"
    version: "3.0.5"
    tiers:
      - name: "Department"
        price_monthly: 4500
        user_limit: 20
      - name: "Facility"
        price_monthly: 12000
        user_limit: 100
    features:
      - "Population health dashboards"
      - "Quality measure tracking (HEDIS/CMS)"
      - "Risk stratification models"
      - "Care gap identification"
      - "Regulatory reporting automation"
      - "Custom analytics workbench"
    common_issues:
      - category: "Data Quality"
        issues:
          - "Quality measure denominator mismatch with EHR"
          - "Risk scores not updating after claims refresh"
          - "Care gaps showing for discharged patients"
      - category: "Reports"
        issues:
          - "CMS submission file validation errors"
          - "Dashboard timeout on large patient populations"
          - "Scheduled report delivery failures"
      - category: "Integration"
        issues:
          - "Claims data feed lag exceeding 48 hours"
          - "Clinical data missing from consolidated view"
          - "Registry export format compatibility issues"

  - name: "HIPAA Compliance Manager"
    code: "HCM"
    type: "SaaS"
    category: "Compliance & Security"
    version: "2.3.1"
    tiers:
      - name: "Standard"
        price_monthly: 800
        user_limit: 50
      - name: "Enterprise"
        price_monthly: 2500
        user_limit: null
    features:
      - "Automated risk assessments"
      - "Policy management and attestation"
      - "Breach notification workflow"
      - "Training tracking and certification"
      - "Business associate agreement management"
      - "Audit preparation toolkit"
    common_issues:
      - category: "Assessments"
        issues:
          - "Risk assessment template not saving custom questions"
          - "Inherited controls not mapping correctly"
          - "Remediation tracking out of sync"
      - category: "Training"
        issues:
          - "Course completion not recording for SCORM modules"
          - "Certificate generation failing for bulk completions"
          - "Annual training reminder emails not sending"
      - category: "Reporting"
        issues:
          - "Compliance dashboard showing stale data"
          - "BAA expiration alerts not triggering"
          - "Audit export missing required evidence files"

# =============================================================================
# Section 3: Support Team Structure
# =============================================================================
support_team:
  tiers:
    - level: "L1"
      name: "Tier 1 Healthcare Support"
      headcount: 8
      shift_coverage: "24x7"
      responsibilities:
        - "Initial ticket triage and categorization"
        - "Common access and portal issues"
        - "Password resets and MFA support"
        - "Basic interface status checks"
        - "Knowledge base guidance"
      escalation_threshold:
        p1: "15 minutes"
        p2: "1 hour"
        p3: "4 hours"
        p4: "8 hours"
      kpis:
        first_response_target: "< 30 minutes"
        resolution_rate: "60%"

    - level: "L2"
      name: "Tier 2 Clinical Integration"
      headcount: 4
      shift_coverage: "16x7"
      responsibilities:
        - "HL7 message troubleshooting"
        - "FHIR resource validation issues"
        - "Interface configuration changes"
        - "Data mapping corrections"
        - "Patient record investigations"
      escalation_threshold:
        p1: "1 hour"
        p2: "4 hours"
      kpis:
        resolution_rate: "80%"
        escalation_rate: "< 20%"

    - level: "L3"
      name: "Engineering Escalation"
      headcount: 2
      shift_coverage: "On-call rotation"
      responsibilities:
        - "Production hotfixes for interfaces"
        - "PHI incident investigation"
        - "Complex integration debugging"
        - "Performance optimization"
        - "Security vulnerability response"
      jira_project: "MTS"
      kpis:
        bug_fix_target: "< 3 business days"
        customer_escalation_rate: "< 5%"

    - level: "Manager"
      name: "Support Management"
      headcount: 1
      responsibilities:
        - "24/7 coverage coordination"
        - "HIPAA incident management"
        - "Customer success alignment"
        - "SLA compliance monitoring"
        - "Vendor relationship management"

# =============================================================================
# Section 4: Case Types and SLAs
# =============================================================================
case_types:
  - type: "Technical"
    percentage: 40
    subtypes:
      - name: "Integration"
        percentage: 35
        typical_products: ["EHR"]
      - name: "Data Sync"
        percentage: 30
        typical_products: ["EHR", "CAS"]
      - name: "Performance"
        percentage: 20
        typical_products: ["CAS", "PPP"]
      - name: "Connectivity"
        percentage: 15
        typical_products: ["EHR"]

  - type: "Access & Security"
    percentage: 25
    subtypes:
      - name: "Patient Access"
        percentage: 40
      - name: "Provider Access"
        percentage: 30
      - name: "SSO/Authentication"
        percentage: 20
      - name: "PHI Access Audit"
        percentage: 10

  - type: "Compliance"
    percentage: 20
    subtypes:
      - name: "HIPAA Inquiries"
        percentage: 40
      - name: "Audit Support"
        percentage: 30
      - name: "BAA Management"
        percentage: 20
      - name: "Breach Response"
        percentage: 10

  - type: "Feature Request"
    percentage: 10
    subtypes:
      - name: "New Integration"
        percentage: 50
      - name: "Enhancement"
        percentage: 50

  - type: "Bug Report"
    percentage: 5
    subtypes:
      - name: "UI/UX Bug"
        percentage: 30
      - name: "Functional Bug"
        percentage: 50
      - name: "Data Bug"
        percentage: 20

slas:
  - priority: "P1"
    label: "Critical"
    description: "PHI exposure, system down affecting patient care"
    response_time: "15 minutes"
    resolution_target: "2 hours"
    percentage: 5
    examples:
      - "PHI data breach or exposure"
      - "Complete EHR interface failure"
      - "Patient care system unavailable"

  - priority: "P2"
    label: "High"
    description: "Major integration failure, compliance deadline at risk"
    response_time: "1 hour"
    resolution_target: "8 hours"
    percentage: 15
    examples:
      - "Lab results not flowing to EHR"
      - "Patient portal completely inaccessible"
      - "Regulatory submission blocked"

  - priority: "P3"
    label: "Medium"
    description: "Feature impaired, workaround available"
    response_time: "4 hours"
    resolution_target: "48 hours"
    percentage: 50
    examples:
      - "Single interface degraded performance"
      - "Report generation delays"
      - "Non-critical data sync issues"

  - priority: "P4"
    label: "Low"
    description: "Minor issue or general question"
    response_time: "8 hours"
    resolution_target: "5 business days"
    percentage: 30
    examples:
      - "Documentation requests"
      - "Feature configuration questions"
      - "Training inquiries"

