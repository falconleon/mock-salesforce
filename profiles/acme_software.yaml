  - segment: "SMB"
    count: 4  # 4 customers
    employee_range: [20, 100]
    industries:
      - "Startup"
      - "Consulting"
      - "Marketing Agency"
      - "Non-profit"
    products_used: ["APH"]  # Entry product
    contract_value: "low"
    annual_contract_value_range: [2000, 15000]
    support_tier: "Standard"
    contacts_per_account: 2
    typical_case_volume: "low"
    characteristics:
      - "Cost-conscious"
      - "Quick issue resolution preferred"
      - "Limited technical resources"

# =============================================================================
# Section 6: Communication Patterns
# =============================================================================
communication:
  email_templates:
    - scenario: "Initial Response"
      tone: "professional, empathetic"
      key_elements:
        - "Thank customer for contacting"
        - "Acknowledge the issue"
        - "Set expectations for next steps"
      example_opening: "Thank you for reaching out to Acme Support."

    - scenario: "Request for Information"
      tone: "helpful, specific"
      key_elements:
        - "Explain what information is needed"
        - "Provide steps to gather info"
        - "Offer alternative ways to provide"
      example_opening: "To help us investigate this further, could you please provide..."

    - scenario: "Resolution Notification"
      tone: "positive, clear"
      key_elements:
        - "Confirm issue is resolved"
        - "Explain what was done"
        - "Provide prevention tips"
      example_opening: "Great news! We've resolved the issue you reported."

    - scenario: "Escalation Notice"
      tone: "reassuring, transparent"
      key_elements:
        - "Explain why escalating"
        - "Set new expectations"
        - "Provide escalation reference"
      example_opening: "We're escalating this to our engineering team for deeper investigation."

    - scenario: "Follow-up Check"
      tone: "caring, brief"
      key_elements:
        - "Check if issue persists"
        - "Offer additional help"
        - "Request feedback"
      example_opening: "We wanted to follow up on your recent support case."

  language_patterns:
    formal_terms:
      - "Thank you for contacting Acme Support"
      - "We apologize for any inconvenience this may have caused"
      - "Please don't hesitate to reach out if you need further assistance"
      - "We appreciate your patience while we investigated this issue"
      - "Your feedback helps us improve our products"

    technical_terms:
      - "project workspace"
      - "sync interval"
      - "API endpoint"
      - "OAuth token"
      - "webhook payload"
      - "flow execution"
      - "data connector"
      - "SSO configuration"
      - "SAML assertion"
      - "rate limiting"

    product_specific:
      APH:
        - "Kanban board"
        - "Gantt view"
        - "task assignment"
        - "project timeline"
        - "resource allocation"
      ATT:
        - "time entry"
        - "billable hours"
        - "utilization report"
        - "timesheet"
        - "timer widget"
      ACN:
        - "integration flow"
        - "connector"
        - "data mapping"
        - "trigger"
        - "transformation"
      AAN:
        - "dashboard"
        - "data source"
        - "visualization"
        - "report schedule"
        - "drill-down"

  customer_tone_patterns:
    frustrated:
      indicators:
        - "This has been ongoing for days"
        - "I've already tried everything"
        - "This is unacceptable"
        - "We're losing business"
      response_approach: "Acknowledge frustration, prioritize resolution, escalate if needed"

    technical:
      indicators:
        - "I checked the API response"
        - "The error log shows..."
        - "I can reproduce with these steps"
      response_approach: "Match technical level, provide detailed explanations"

    executive:
      indicators:
        - "I need this resolved ASAP"
        - "What's your SLA?"
        - "Please escalate to management"
      response_approach: "Professional, concise, focus on impact and timeline"

# =============================================================================
# Section 7: JIRA Escalation Patterns
# =============================================================================
jira:
  project_key: "ACME"
  project_name: "Acme Engineering Support"

  issue_types:
    - name: "Bug"
      percentage: 50
      description: "Software defect requiring code fix"
      typical_priority: ["High", "Medium"]

    - name: "Support Escalation"
      percentage: 30
      description: "Customer issue requiring engineering investigation"
      typical_priority: ["High", "Critical"]

    - name: "Performance Issue"
      percentage: 15
      description: "System performance degradation"
      typical_priority: ["Critical", "High"]

    - name: "Integration Request"
      percentage: 5
      description: "New integration or connector enhancement"
      typical_priority: ["Medium", "Low"]

  components:
    - name: "Project Hub"
      code: "APH"
      lead: "L3 Engineer"
    - name: "Time Tracker"
      code: "ATT"
      lead: "L3 Engineer"
    - name: "Connect Platform"
      code: "ACN"
      lead: "L3 Engineer"
    - name: "Analytics"
      code: "AAN"
      lead: "L3 Engineer"
    - name: "API"
      code: "API"
      lead: "L3 Engineer"
    - name: "SSO/Auth"
      code: "AUTH"
      lead: "L3 Engineer"
    - name: "Infrastructure"
      code: "INFRA"
      lead: "L3 Engineer"

  priorities:
    - name: "Critical"
      description: "Production down, immediate action required"
      response_time: "1 hour"
    - name: "High"
      description: "Major functionality impaired"
      response_time: "4 hours"
    - name: "Medium"
      description: "Important but not blocking"
      response_time: "1 business day"
    - name: "Low"
      description: "Minor issue or improvement"
      response_time: "1 week"

  escalation_criteria:
    automatic:
      - "Customer impact > 100 users"
      - "Data loss or corruption"
      - "Security vulnerability"
      - "P1 not resolved in 4 hours"
      - "Same issue reported by 3+ customers"
    manual:
      - "Customer requests engineering review"
      - "L2 unable to reproduce or diagnose"
      - "Suspected product bug"
      - "Performance degradation confirmed"

  workflow:
    statuses:
      - "Open"
      - "In Progress"
      - "In Review"
      - "Pending Deployment"
      - "Resolved"
      - "Closed"
    transitions:
      - from: "Open"
        to: "In Progress"
        action: "Start Work"
      - from: "In Progress"
        to: "In Review"
        action: "Submit for Review"
      - from: "In Review"
        to: "Pending Deployment"
        action: "Approve"
      - from: "Pending Deployment"
        to: "Resolved"
        action: "Deploy to Production"
      - from: "Resolved"
        to: "Closed"
        action: "Verify and Close"

  labels:
    - "customer-escalation"
    - "production-issue"
    - "data-integrity"
    - "performance"
    - "security"
    - "integration"
    - "regression"
    - "hotfix-required"
