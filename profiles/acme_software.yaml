# Acme Software Inc. - Vendor Profile
# This profile drives all mock data generation for the pattern template.
# Used by Layer 3 generators to create realistic demo data.

# =============================================================================
# Section 1: Company Information
# =============================================================================
company:
  name: "Acme Software Inc."
  founded: 2012
  headquarters: "Austin, TX"
  website: "acmesoftware.com"
  industry: "Enterprise Software / SaaS"
  employees: 450
  annual_revenue: 85000000  # $85M ARR
  tagline: "Streamline Your Workflow"
  description: |
    Acme Software is a mid-sized enterprise software company providing
    project management, time tracking, and integration solutions to B2B
    customers across multiple industries.

# =============================================================================
# Section 2: Products (4 products with detailed issue profiles)
# =============================================================================
products:
  - name: "Acme Project Hub"
    code: "APH"
    type: "SaaS"
    category: "Project Management"
    version: "4.2.1"
    tiers:
      - name: "Starter"
        price_monthly: 15
        user_limit: 10
      - name: "Professional"
        price_monthly: 35
        user_limit: 50
      - name: "Enterprise"
        price_monthly: 75
        user_limit: null  # unlimited
    features:
      - "Task management with Kanban boards"
      - "Gantt charts and timeline views"
      - "Resource allocation and capacity planning"
      - "Team collaboration with real-time comments"
      - "Custom workflows and automations"
      - "Reporting and dashboards"
    common_issues:
      - category: "Authentication"
        issues:
          - "SSO login failures after IdP certificate renewal"
          - "SAML assertion timeout errors"
          - "MFA token sync issues with Authenticator apps"
      - category: "Performance"
        issues:
          - "Dashboard loading slowly with 500+ projects"
          - "Gantt chart rendering timeout on large programs"
          - "Search indexing delays after bulk imports"
      - category: "Data Sync"
        issues:
          - "Conflicts when multiple users edit same task"
          - "Mobile app changes not reflecting on web"
          - "API webhook deliveries failing intermittently"
      - category: "Integrations"
        issues:
          - "Slack notifications not sending"
          - "Jira sync duplicating issues"
          - "Calendar integration shows wrong timezone"

  - name: "Acme Time Tracker"
    code: "ATT"
    type: "SaaS"
    category: "Time & Resource Management"
    version: "3.1.0"
    tiers:
      - name: "Basic"
        price_monthly: 8
        user_limit: 25
      - name: "Business"
        price_monthly: 18
        user_limit: 100
    features:
      - "Automatic time capture from calendar"
      - "Project-based time allocation"
      - "Billable vs non-billable tracking"
      - "Team utilization reports"
      - "Overtime and PTO management"
      - "Export to payroll systems"
    common_issues:
      - category: "Time Entry"
        issues:
          - "Timer not stopping when laptop sleeps"
          - "Time entries disappearing after save"
          - "Duplicate entries from browser refresh"
      - category: "Reports"
        issues:
          - "Utilization percentages not matching manual calculation"
          - "Report export truncating after 1000 rows"
          - "PDF reports showing blank charts"
      - category: "Integrations"
        issues:
          - "QuickBooks export failing with special characters"
          - "Calendar auto-capture missing recurring events"
          - "Project Hub link broken after project rename"

  - name: "Acme Connect"
    code: "ACN"
    type: "iPaaS"
    category: "Integration Platform"
    version: "2.4.0"
    tiers:
      - name: "Standard"
        price_monthly: 99
        flow_limit: 10
      - name: "Professional"
        price_monthly: 299
        flow_limit: 50
      - name: "Enterprise"
        price_monthly: 899
        flow_limit: null
    features:
      - "Pre-built connectors for 150+ apps"
      - "Visual flow builder"
      - "Data transformation and mapping"
      - "Error handling and retry logic"
      - "Webhook triggers and schedulers"
      - "API gateway and rate limiting"
    common_issues:
      - category: "Connectivity"
        issues:
          - "OAuth token refresh failing for Salesforce connector"
          - "Connection timeout to on-premise systems"
          - "API rate limits exceeded on HubSpot"
      - category: "Data Mapping"
        issues:
          - "Field mapping losing configuration after update"
          - "Date format conversion errors between systems"
          - "Null values causing flow failures"
      - category: "Execution"
        issues:
          - "Scheduled flows not triggering at configured time"
          - "Flow stuck in 'Running' state"
          - "Retry logic creating duplicate records"

  - name: "Acme Analytics"
    code: "AAN"
    type: "SaaS"
    category: "Business Intelligence"
    version: "1.8.2"
    tiers:
      - name: "Team"
        price_monthly: 49
        user_limit: 10
      - name: "Business"
        price_monthly: 149
        user_limit: 50
    features:
      - "Real-time dashboards"
      - "Custom report builder"
      - "Data warehouse connections"
      - "Scheduled report delivery"
      - "Embedded analytics"
    common_issues:
      - category: "Data"
        issues:
          - "Dashboard showing stale data after refresh"
          - "Query timeout on large datasets"
          - "Incorrect aggregation with multiple data sources"
      - category: "Visualization"
        issues:
          - "Charts not rendering in Safari"
          - "PDF export cutting off dashboard"
          - "Drill-down not working on mobile"

# =============================================================================
# Section 3: Support Team Structure
# =============================================================================
support_team:
  tiers:
    - level: "L1"
      name: "Tier 1 Support"
      headcount: 8
      shift_coverage: "24x5"  # Mon-Fri, follow-the-sun
      responsibilities:
        - "Initial ticket triage and categorization"
        - "Common issue resolution from knowledge base"
        - "Account access and password resets"
        - "License and billing inquiries"
        - "Basic product questions"
      escalation_threshold:
        p1: "30 minutes"
        p2: "2 hours"
        p3: "4 hours"
        p4: "8 hours"
      kpis:
        first_response_target: "< 1 hour"
        resolution_rate: "65%"

    - level: "L2"
      name: "Tier 2 Technical Support"
      headcount: 4
      shift_coverage: "16x5"
      responsibilities:
        - "Technical troubleshooting and diagnostics"
        - "Configuration and setup issues"
        - "Integration problems"
        - "Performance investigations"
        - "Data import/export issues"
      escalation_threshold:
        p1: "2 hours"
        p2: "8 hours"
      kpis:
        resolution_rate: "85%"
        escalation_rate: "< 15%"

    - level: "L3"
      name: "Engineering Escalation"
      headcount: 2
      shift_coverage: "On-call rotation"
      responsibilities:
        - "Bug fixes and hotpatches"
        - "Complex integration debugging"
        - "Root cause analysis"
        - "Database-level investigations"
        - "Customer-specific custom solutions"
      jira_project: "ACME"
      kpis:
        bug_fix_target: "< 5 business days"
        customer_escalation_rate: "< 3%"

    - level: "Manager"
      name: "Support Management"
      headcount: 1
      responsibilities:
        - "Team scheduling and capacity"
        - "Escalation handling"
        - "Customer success coordination"
        - "SLA compliance monitoring"
        - "Process improvement"

# =============================================================================
# Section 4: Case Types and SLAs
# =============================================================================
case_types:
  - type: "Technical"
    percentage: 45  # Largest category
    subtypes:
      - name: "Performance"
        percentage: 25
        typical_products: ["APH", "AAN"]
      - name: "Integration"
        percentage: 30
        typical_products: ["ACN"]
      - name: "API"
        percentage: 20
        typical_products: ["ACN", "APH"]
      - name: "Data Sync"
        percentage: 25
        typical_products: ["APH", "ATT"]

  - type: "Account & Access"
    percentage: 25
    subtypes:
      - name: "Login Issues"
        percentage: 40
      - name: "Permission Problems"
        percentage: 30
      - name: "SSO Configuration"
        percentage: 20
      - name: "License Management"
        percentage: 10

  - type: "Billing"
    percentage: 15
    subtypes:
      - name: "Invoice Questions"
        percentage: 40
      - name: "Upgrade/Downgrade"
        percentage: 35
      - name: "Refund Requests"
        percentage: 15
      - name: "Payment Failures"
        percentage: 10

  - type: "Feature Request"
    percentage: 10
    subtypes:
      - name: "New Functionality"
        percentage: 60
      - name: "Enhancement"
        percentage: 40

  - type: "Bug Report"
    percentage: 5
    subtypes:
      - name: "UI/UX Bug"
        percentage: 40
      - name: "Functional Bug"
        percentage: 45
      - name: "Data Bug"
        percentage: 15

slas:
  - priority: "P1"
    label: "Critical"
    description: "System down or data loss affecting production"
    response_time: "1 hour"
    resolution_target: "4 hours"
    percentage: 5
    examples:
      - "Complete service outage"
      - "Data corruption or loss"
      - "Security breach"

  - priority: "P2"
    label: "High"
    description: "Major feature broken, no workaround"
    response_time: "4 hours"
    resolution_target: "24 hours"
    percentage: 15
    examples:
      - "Unable to create new projects"
      - "Reporting completely broken"
      - "All integrations failing"

  - priority: "P3"
    label: "Medium"
    description: "Feature impaired, workaround available"
    response_time: "8 hours"
    resolution_target: "72 hours"
    percentage: 50
    examples:
      - "Slow dashboard loading"
      - "Single integration failing"
      - "Export to specific format broken"

  - priority: "P4"
    label: "Low"
    description: "Minor issue or general question"
    response_time: "24 hours"
    resolution_target: "1 week"
    percentage: 30
    examples:
      - "Cosmetic UI issues"
      - "Feature requests"
      - "How-to questions"

# =============================================================================
