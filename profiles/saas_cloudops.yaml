# =============================================================================
# Section 6: Communication Patterns
# =============================================================================
communication:
  email_templates:
    - scenario: "Initial Response"
      tone: "friendly, developer-to-developer"
      key_elements:
        - "Acknowledge the issue"
        - "Ask clarifying technical questions"
        - "Share relevant documentation"
      example_opening: "Thanks for reaching out to CloudOps Support!"

    - scenario: "Request for Information"
      tone: "collaborative, specific"
      key_elements:
        - "Request logs, configs, or error messages"
        - "Provide commands to gather info"
        - "Offer to set up a screen share"
      example_opening: "To dig into this further, could you share..."

    - scenario: "Resolution Notification"
      tone: "positive, technical"
      key_elements:
        - "Explain what was done"
        - "Share the root cause"
        - "Provide prevention tips"
      example_opening: "Good news - we've resolved the issue!"

    - scenario: "Escalation Notice"
      tone: "transparent, timeline-focused"
      key_elements:
        - "Explain engineering involvement"
        - "Set clear expectations"
        - "Provide tracking reference"
      example_opening: "I'm escalating this to our platform engineering team."

    - scenario: "Follow-up Check"
      tone: "casual, helpful"
      key_elements:
        - "Check if issue persists"
        - "Offer additional optimization"
        - "Request feedback"
      example_opening: "Just checking in on your support case."

  language_patterns:
    formal_terms:
      - "Thanks for reaching out to CloudOps Support"
      - "Let us know if you need any clarification"
      - "Happy to hop on a call to debug together"
      - "We've updated our runbook based on your feedback"
      - "Here's a link to our docs for future reference"

    technical_terms:
      - "pod"
      - "deployment"
      - "container"
      - "ingress"
      - "service mesh"
      - "pipeline"
      - "artifact"
      - "metric"
      - "span"
      - "trace"

    product_specific:
      COE:
        - "cluster"
        - "node pool"
        - "HPA"
        - "PVC"
        - "namespace"
      CIP:
        - "pipeline run"
        - "build stage"
        - "artifact"
        - "cache layer"
        - "approval gate"
      MOS:
        - "dashboard"
        - "alert rule"
        - "trace ID"
        - "log stream"
        - "metric query"
      COP:
        - "cost allocation"
        - "rightsizing"
        - "reserved instance"
        - "spend anomaly"
        - "chargeback"

  customer_tone_patterns:
    frustrated:
      indicators:
        - "Builds have been failing all day"
        - "We can't deploy to production"
        - "This is blocking our release"
        - "We're about to miss our deadline"
      response_approach: "Prioritize unblocking, offer screen share, escalate if deployment is blocked"

    technical:
      indicators:
        - "The Kubernetes events show..."
        - "I ran kubectl describe and..."
        - "Looking at the Prometheus metrics..."
      response_approach: "Match technical depth, share debugging commands, collaborate on troubleshooting"

    executive:
      indicators:
        - "Our VP of Engineering is asking"
        - "We need this for board metrics"
        - "Can you involve your product team"
      response_approach: "Executive summary, focus on business impact, offer architecture review"

# =============================================================================
# Section 7: JIRA Escalation Patterns
# =============================================================================
jira:
  project_key: "COP"
  project_name: "CloudOps Platform Engineering"

  issue_types:
    - name: "Bug"
      percentage: 50
      description: "Platform defect requiring code fix"
      typical_priority: ["High", "Medium"]

    - name: "Support Escalation"
      percentage: 25
      description: "Customer issue requiring engineering"
      typical_priority: ["High", "Critical"]

    - name: "Performance Issue"
      percentage: 15
      description: "Latency or throughput problem"
      typical_priority: ["High", "Medium"]

    - name: "Feature Request"
      percentage: 10
      description: "New capability or integration"
      typical_priority: ["Medium", "Low"]

  components:
    - name: "Container Orchestrator"
      code: "COE"
      lead: "L3 Engineer"
    - name: "CI/CD Pipeline"
      code: "CIP"
      lead: "L3 Engineer"
    - name: "Monitoring Suite"
      code: "MOS"
      lead: "L3 Engineer"
    - name: "Cost Optimizer"
      code: "COP"
      lead: "L3 Engineer"
    - name: "API"
      code: "API"
      lead: "L3 Engineer"
    - name: "Infrastructure"
      code: "INFRA"
      lead: "L3 Engineer"

  priorities:
    - name: "Critical"
      description: "Production deployments blocked"
      response_time: "30 minutes"
    - name: "High"
      description: "Major functionality impaired"
      response_time: "2 hours"
    - name: "Medium"
      description: "Important but workaround exists"
      response_time: "1 business day"
    - name: "Low"
      description: "Minor issue or enhancement"
      response_time: "1 week"

  escalation_criteria:
    automatic:
      - "Production cluster unreachable"
      - "All pipeline builds failing"
      - "Data loss or corruption"
      - "Security vulnerability identified"
      - "P1 not resolved in 4 hours"
    manual:
      - "Customer requests engineering review"
      - "L2 unable to reproduce"
      - "Suspected platform bug"
      - "Performance regression identified"

  workflow:
    statuses:
      - "Open"
      - "In Progress"
      - "In Review"
      - "Staging"
      - "Pending Release"
      - "Resolved"
      - "Closed"
    transitions:
      - from: "Open"
        to: "In Progress"
        action: "Start Work"
      - from: "In Progress"
        to: "In Review"
        action: "Submit PR"
      - from: "In Review"
        to: "Staging"
        action: "Merge to Main"
      - from: "Staging"
        to: "Pending Release"
        action: "Staging Verified"
      - from: "Pending Release"
        to: "Resolved"
        action: "Release to Production"
      - from: "Resolved"
        to: "Closed"
        action: "Customer Verified"

  labels:
    - "customer-escalation"
    - "production-impact"
    - "deployment-blocked"
    - "performance-regression"
    - "security-concern"
    - "data-integrity"
    - "hotfix-required"
    - "docs-needed"
