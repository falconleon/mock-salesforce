root = "."
tmp_dir = "tmp"

[build]
  cmd = "CGO_ENABLED=1 go build -o ./tmp/salesforce-mock ./cmd/salesforce-mock/"
  bin = "./tmp/salesforce-mock"
  args_bin = ["-port", "8085", "-seed", "./testdata/seed"]
  include_ext = ["go", "html", "css", "js", "json"]
  exclude_dir = ["tmp", "data", "vendor", "profiles", "docs", "dev-docs", ".git", ".beads"]
  exclude_regex = ["_test\\.go$"]
  delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true
