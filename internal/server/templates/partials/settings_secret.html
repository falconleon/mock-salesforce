{{define "settings_secret_hidden"}}
<span class="secret-display" id="client-secret-cell">
    <code class="settings-value secret-mask" data-state="hidden">••••••••••••</code>
    <button type="button" class="secret-toggle"
        hx-get="{{basePath}}/settings/secret/shown"
        hx-target="#client-secret-cell" hx-swap="outerHTML"
        title="Show secret" aria-label="Show secret">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 5C5 5 1 12 1 12s4 7 11 7 11-7 11-7-4-7-11-7zm0 12a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/></svg>
    </button>
</span>
{{end}}

{{define "settings_secret_shown"}}
<span class="secret-display" id="client-secret-cell">
    <code class="settings-value" data-state="shown">{{.ClientSecret}}</code>
    <button type="button" class="secret-toggle"
        hx-get="{{basePath}}/settings/secret/hidden"
        hx-target="#client-secret-cell" hx-swap="outerHTML"
        title="Hide secret" aria-label="Hide secret">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M2.1 3.5L3.5 2.1l18.4 18.4-1.4 1.4-3.3-3.3A12.6 12.6 0 0112 19C5 19 1 12 1 12a16 16 0 014.2-4.7L2.1 3.5zM12 9a3 3 0 012.83 4l-3.83-3.83A3 3 0 0112 9zm0-4c7 0 11 7 11 7a16 16 0 01-3.5 4.4l-2.86-2.86A5 5 0 0010.46 7.4L8.5 5.43A12.5 12.5 0 0112 5z"/></svg>
    </button>
</span>
{{end}}
