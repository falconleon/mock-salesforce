{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — FalconMode Salesforce</title>
    <link rel="stylesheet" href="{{basePath}}/static/salesforce.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="{{basePath}}/lightning/o/Case/list" class="logo">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M10.71 3.04c1.23-1.28 2.94-2.07 4.83-2.07 2.72 0 5.08 1.64 6.13 3.99a7.08 7.08 0 019.13 6.79c0 3.91-3.17 7.08-7.08 7.08-.42 0-.83-.04-1.23-.11a5.67 5.67 0 01-4.87 2.81 5.63 5.63 0 01-2.77-.73 6.27 6.27 0 01-5.28 2.88c-3.18 0-5.82-2.36-6.23-5.42A5.15 5.15 0 010 13.25a5.14 5.14 0 014.42-5.09 6.28 6.28 0 016.29-5.12z"/></svg>
                <span>FalconMode Salesforce</span>
            </a>
            <nav class="nav">
                <a href="{{basePath}}/lightning/o/Case/list">Cases</a>
                <a href="{{basePath}}/lightning/o/Account/list">Accounts</a>
            </nav>
            <a id="falcon-return-btn" class="falcon-return-btn" style="display:none" href="#">
                <svg viewBox="0 0 20 20" width="14" height="14" fill="currentColor"><path d="M10.707 3.293a1 1 0 00-1.414 0l-6 6a1 1 0 000 1.414l6 6a1 1 0 001.414-1.414L6.414 11H17a1 1 0 100-2H6.414l4.293-4.293a1 1 0 000-1.414z"/></svg>
                Back to FalconMode
            </a>
        </div>
    </header>
    <main class="main">
        {{template "content" .}}
    </main>
    <script>
    (function() {
        var m = document.cookie.match(/(?:^|;\s*)falcon_return=([^;]+)/);
        if (!m) return;
        var url = decodeURIComponent(m[1]);
        var btn = document.getElementById('falcon-return-btn');
        btn.href = url;
        btn.style.display = '';
        btn.addEventListener('click', function() {
            document.cookie = 'falcon_return=; path=/; max-age=0';
        });
    })();
    </script>
</body>
</html>
{{end}}
