{{define "login"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — FalconMode Salesforce</title>
    <link rel="stylesheet" href="{{.BasePath}}/static/salesforce.css">
    <style>
        .login-container { max-width: 400px; margin: 80px auto; padding: 2rem; }
        .login-form { background: white; border-radius: 8px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .login-form h1 { text-align: center; margin-bottom: 1.5rem; color: #032d60; }
        .login-form input { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .login-form button { width: 100%; padding: 0.75rem; background: #0176d3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        .login-form button:hover { background: #014486; }
        .login-error { color: #c23934; text-align: center; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <span class="logo">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M10.71 3.04c1.23-1.28 2.94-2.07 4.83-2.07 2.72 0 5.08 1.64 6.13 3.99a7.08 7.08 0 019.13 6.79c0 3.91-3.17 7.08-7.08 7.08-.42 0-.83-.04-1.23-.11a5.67 5.67 0 01-4.87 2.81 5.63 5.63 0 01-2.77-.73 6.27 6.27 0 01-5.28 2.88c-3.18 0-5.82-2.36-6.23-5.42A5.15 5.15 0 010 13.25a5.14 5.14 0 014.42-5.09 6.28 6.28 0 016.29-5.12z"/></svg>
                <span>FalconMode Salesforce</span>
            </span>
        </div>
    </header>
    <div class="login-container">
        <form class="login-form" method="POST" action="{{.BasePath}}/login">
            <h1>Sign In</h1>
            {{if .Error}}<p class="login-error">Invalid email or password.</p>{{end}}
            <input type="email" name="email" placeholder="Email" required autofocus>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
    </div>
</body>
</html>
{{end}}
