{{define "login"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — FalconMode Salesforce</title>
    <link rel="icon" type="image/svg+xml" href="{{.BasePath}}/static/favicon.svg">
    <link rel="stylesheet" href="{{.BasePath}}/static/salesforce.css">
</head>
<body>
    <a class="skip-link" href="#login-form">Skip to login form</a>
    <header class="header" role="banner">
        <div class="header-inner">
            <span class="logo">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="white" aria-hidden="true" focusable="false"><path d="M10.71 3.04c1.23-1.28 2.94-2.07 4.83-2.07 2.72 0 5.08 1.64 6.13 3.99a7.08 7.08 0 019.13 6.79c0 3.91-3.17 7.08-7.08 7.08-.42 0-.83-.04-1.23-.11a5.67 5.67 0 01-4.87 2.81 5.63 5.63 0 01-2.77-.73 6.27 6.27 0 01-5.28 2.88c-3.18 0-5.82-2.36-6.23-5.42A5.15 5.15 0 010 13.25a5.14 5.14 0 014.42-5.09 6.28 6.28 0 016.29-5.12z"/></svg>
                <span>FalconMode Salesforce</span>
            </span>
        </div>
    </header>
    <main id="login-form">
        <div class="login-container">
            <form class="login-form" method="POST" action="{{.BasePath}}/login" aria-label="Sign in">
                <h1>Sign In</h1>
                {{if .Error}}<p class="login-error" role="alert">Invalid email or password.</p>{{end}}
                {{if .FalconReturn}}<input type="hidden" name="falcon_return" value="{{.FalconReturn}}">{{end}}
                {{if .Next}}<input type="hidden" name="next" value="{{.Next}}">{{end}}
                <label for="login-email">Email</label>
                <input id="login-email" type="email" name="email" autocomplete="email" required autofocus>
                <label for="login-password">Password</label>
                <input id="login-password" type="password" name="password" autocomplete="current-password" required>
                <button type="submit">Log In</button>
            </form>
        </div>
    </main>
</body>
</html>
{{end}}
