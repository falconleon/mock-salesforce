{{template "layout" .}}
{{define "content"}}
<div class="page-header">
    <h1>Accounts</h1>
    <span class="count-badge">{{.Total}} items</span>
</div>
<table class="sf-table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Industry</th>
            <th>Type</th>
            <th>Phone</th>
        </tr>
    </thead>
    <tbody>
        {{range .Accounts}}
        <tr class="sf-row" onclick="window.location='{{basePath}}/lightning/r/Account/{{fieldStr . "Id"}}/view'">
            <td><a href="{{basePath}}/lightning/r/Account/{{fieldStr . "Id"}}/view">{{fieldStr . "Name"}}</a></td>
            <td>{{fieldStr . "Industry"}}</td>
            <td>{{fieldStr . "Type"}}</td>
            <td>{{fieldStr . "Phone"}}</td>
        </tr>
        {{end}}
    </tbody>
</table>
{{end}}
